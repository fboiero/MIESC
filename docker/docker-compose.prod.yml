# MIESC Core production Docker Compose
# For local production testing of the open-core REST API.

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: miesc-api
    ports:
      - "8000:8000"
    environment:
      - MIESC_ENV=production
    volumes:
      - miesc-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - miesc-network

volumes:
  miesc-data:
    driver: local

networks:
  miesc-network:
    driver: bridge
